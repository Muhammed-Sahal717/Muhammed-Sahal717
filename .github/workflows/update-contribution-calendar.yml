name: Update contribution calendar

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate calendar
        run: node scripts/generate-contribution-calendar.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/contribution-calendar.svg; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-calendar.svg
          git commit -m "Update contribution calendar"
          git push
